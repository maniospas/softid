<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CERTH Catalogue</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <style>
      img {max-width:500px;display:none}
      #search-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: white;
        padding: 1rem 0;
        border-bottom: 1px solid #eee;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
  <div class="container">
    <div id="search-bar">
      <div class="field">
        <div class="control has-icons-left">
          <input class="input is-medium" type="text" id="search-input" placeholder="Search catalogue…">
          <span class="icon is-left">🔍</span>
        </div>
        <p class="help" id="search-hint"></p>
      </div>
    </div>
    <div class="fixed-grid has-1-cols" id="catalogue">
      {{CONTENTS}}
    </div>
  </div>
  <script>
    const entries = Array.from(document.querySelectorAll('#catalogue .cell'));
    const input = document.getElementById('search-input');
    const hint = document.getElementById('search-hint');
    let debounce;

    function search(raw) {
      const terms = raw.trim().toLowerCase().split(/\s+/).filter(t=>t.length>=2);
      if (!terms.length) {
        entries.forEach(e => { e.style.display = ''; e.style.order = ''; });
        hint.textContent = '';
        return;
      }
      const scored = entries.map(entry => {
        const id = entry.id;
        const kws = kwdata[id] ?? {};
        let score = 0;
        for(const term of terms) {
          let included = false;
          for (const [kw, weight] of Object.entries(kws)) {
            if (kw.startsWith(term)) {
              score += weight;
              included = true;
            }
          }
          if(!included) return { entry, score: 0 };
        }
        return { entry, score };
      });
      scored.forEach(s => s.entry.style.display=s.score>0?'':'none');
      const visible = scored.filter(s=>s.score>0).sort((a, b) => b.score-a.score);
      visible.forEach(({ entry }, i) => entry.style.order=i);
      const catalogue = document.getElementById('catalogue');
      catalogue.style.display = 'flex';
      catalogue.style.flexDirection = 'column';
      hint.textContent = visible.length
        ? `Showing ${visible.length} result${visible.length>1?'s':''}`
        : 'No results found';
    }

    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => search(input.value), 100);
    });
  </script>
  </body>
</html>
